<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAN-XT</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background-color: #000;
      color: #fff;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #000;
      z-index: 0;
    }

    nav, .main {
      position: relative;
      z-index: 2;
    }

    body > .main {
      margin-top: 20px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background-color: rgba(0, 0, 0, 0.8);
      font-size: 16px;
      box-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      text-decoration: none;
      color: #ccc;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: #fff;
    }

    nav .login a {
      color: #00f5c6;
      text-decoration: none;
      font-weight: bold;
    }

    .main {
      display: flex;
      align-items: stretch;
      justify-content: center;
      min-height: 70vh;
      padding: 30px;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 50px;
    }

    .left h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .left h1 span {
      background: linear-gradient(90deg, #00f5c6, #F24E1E);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    .left p {
      font-family: 'Times New Roman', Times, serif;
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .vertical-line {
      height: 500px;
      width: 1px;
      background-color: #fafafa;
      margin: 0 40px;
    }

    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 350px;
      background: #0c0c0c;
      border-radius: 40px;
      padding: 25px 35px;
      border: 1px solid #cccccc;
      box-shadow: 0 0 10px #7e7e7e;
      margin: 20px;
    }

    .top {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
    }

    .heading {
      text-align: center;
      font-weight: 900;
      font-size: 40px;
      color: #cccccc;
    }

    .form .input {
      color: #cccccc;
      width: 100%;
      background: #000;
      border: none;
      padding: 15px 20px;
      border-radius: 20px;
      margin-top: 15px;
    }

    .form .input:focus {
      outline: none;
      border-inline: 2px solid #F24E1E;
    }

    .form .login-button {
      display: block;
      width: 100%;
      font-weight: bold;
      background: #F24E1E;
      color: #cccccc;
      padding-block: 15px;
      margin: 20px auto;
      border-radius: 20px;
      border: none;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }

    .form .login-button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 10px #F24E1E;
    }

    .input {
      max-width: 315px;
    }
  </style>
</head>
<body>

<!-- Particles Background -->
<div id="particles-js"></div>

<!-- Navigation + Main Content -->
<nav>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Track Expenses</a></li>
    <li><a href="#">Reports</a></li>
  </ul>
</nav>

<div class="main">
  <div class="left">
    <h1>Manage Your<br>Expenses Easily With <span>San-XT</span></h1>
    <p>We are providing easiest way to manage expenses. Track your spendings and view them anytime anywhere</p>
    <p><small>@By Hassan<br>
      +250 793091682<br>
      A Penny Saved Is A Penny Earned</small> 
    </p>
  </div>

  <div class="vertical-line"></div>

  <div class="right">
    <div class="container">
      <div class="top">
        <div class="heading" style="margin-left:100px;">SAN-XT</div>
      </div>
      <form action="" class="form" style="margin-top: 20px;">
        <input class="input" type="email" name="email" placeholder="E-mail" required="">
        <input class="input" type="password" name="password" placeholder="Password" style="margin-bottom: 20px;" required="">
        <button class="login-button" onclick="window.location.href='homepage.jsp'">Confirm</button>
      </form>
    </div>
  </div>
</div>

<!-- Include particles.js library -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<!-- Configure particles -->
<script>
  particlesJS('particles-js', {
    "particles": {
      "number": {
        "value": 80,
        "density": {
          "enable": true,
          "value_area": 800
        }
      },
      "color": {
        "value": "#ffffff"
      },
      "shape": {
        "type": "circle",
        "stroke": {
          "width": 0,
          "color": "#000000"
        }
      },
      "opacity": {
        "value": 0.5,
        "random": false
      },
      "size": {
        "value": 3,
        "random": true
      },
      "line_linked": {
        "enable": true,
        "distance": 150,
        "color": "#ffffff",
        "opacity": 0.4,
        "width": 1
      },
      "move": {
        "enable": true,
        "speed": 3,
        "direction": "none",
        "random": false,
        "straight": false,
        "out_mode": "out",
        "attract": {
          "enable": false
        }
      }
    },
    "interactivity": {
      "events": {
        "onhover": {
          "enable": true,
          "mode": "repulse"
        },
        "onclick": {
          "enable": true,
          "mode": "push"
        }
      }
    },
    "retina_detect": true
  });
</script>

</body>
</html>
